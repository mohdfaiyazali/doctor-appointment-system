{% extends 'base.html' %}

{% block title %}Add Review{% endblock %}

{% block content %}

<div class="container mt-5" style="max-width: 500px;">
    <h3>Give Review</h3>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="btn btn-success w-100">Submit Review</button>
    </form>
</div>

{% endblock %}
